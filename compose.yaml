---
services:
  python:
    container_name: focus-service-knowledge-base-processor-python
    build:
      context: .
      dockerfile: docker/python/Dockerfile
    restart: on-failure
    working_dir: /code
    volumes:
      - ./:/code
      - /code/.venv
    env_file:
      - .env.dist
      - secrets.env
      - .env
    environment:
      PYTHONPATH: /code
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8886", "--reload"]

  nginx:
    container_name: focus-service-knowledge-base-processor-nginx
    image: teamleader/nginx:1.29-focus-1.0.2
    restart: on-failure
    working_dir: /code
    volumes:
      - ./:/code
      - ./docker/nginx/default.conf.template:/etc/nginx/conf.d/default.conf.template
      - ./docker/nginx/entrypoint.sh:/usr/local/bin/entrypoint.sh
    env_file:
      - .env.dist
      - .env
    environment:
      VIRTUAL_HOST: api.knowledge-base-processor.focus.teamleader.dev
      NODE_DNS: focus-service-knowledge-base-processor-python
    command: ["/bin/sh", "-c", "/usr/local/bin/entrypoint.sh"]
    ports:
      - '8887:80'
    links:
      - python
    depends_on:
      - python
    networks:
      default:
        aliases:
          - api.knowledge-base-processor.focus.teamleader.dev

networks:
  default:
    name: tlnetwork
    external: true
